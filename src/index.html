<!doctype html>
<html
  id="fuse"
  lang="en"
>
  <head>
    <base href="/" />
    <title>Fuse - Angular Admin Template & Starter</title>

    <!-- Meta -->
    <meta charset="utf-8" />
    <meta
      name="description"
      content="Fuse - Angular Admin Template & Starter"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      href="favicon.png"
    />

    <!-- Preload fonts -->
    <link
      rel="preload"
      href="/fonts/geist/Geist.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/geist/Geist-Italic.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/geist/GeistMono.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/geist/GeistMono-Italic.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
  </head>
  <body>
    <!-- prettier-ignore -->
    <script>
      !function(){try{const e=document.documentElement.classList;e.remove("scheme-dark","scheme-light");const c=localStorage.getItem("scheme"),t=window.matchMedia("(prefers-color-scheme: dark)").matches,s="dark"===c||"system"===c&&t?"scheme-dark":"scheme-light";e.add(s)}catch(e){}}();
    </script>

    <app-root></app-root>
  </body>
</html>
